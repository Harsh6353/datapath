<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataPath – Login</title>
    <meta name="description" content="Login or register to access your personalized Data Analyst Roadmap." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ── LOGIN PAGE STYLES ── */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            perspective: 1200px;
        }

        /* 3D animated background */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(800px) rotateX(30deg) scale(2);
            transform-origin: center top;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 0 -80px;
            }
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite alternate;
        }

        .bg-orb-1 {
            width: 500px;
            height: 500px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.25), transparent 70%);
        }

        .bg-orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2), transparent 70%);
            animation-delay: -4s;
        }

        .bg-orb-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(34, 211, 238, 0.1), transparent 70%);
            animation-delay: -2s;
        }

        @keyframes orbFloat {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 20px) scale(1.1);
            }
        }

        /* 3D Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--blue-400);
            opacity: 0.4;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.4;
            }

            90% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* LOGIN CARD */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }

        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(24px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            transform: perspective(800px) rotateX(0deg);
            transition: transform 0.1s ease;
        }

        .login-card-inner {
            transform: translateZ(20px);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6));
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6))
            }

            50% {
                filter: drop-shadow(0 0 35px rgba(139, 92, 246, 0.8))
            }
        }

        .login-logo-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--blue-400), var(--purple-400), var(--cyan-400));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-logo-sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }

        /* TABS */
        .auth-tabs {
            display: flex;
            gap: 0.3rem;
            background: var(--bg-700);
            border-radius: 12px;
            padding: 0.3rem;
            margin-bottom: 1.8rem;
        }

        .auth-tab {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--blue-600), var(--purple-500));
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* FORM */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            letter-spacing: 0.03em;
        }

        .form-input {
            width: 100%;
            background: var(--bg-700);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--blue-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.5;
        }

        .input-wrap .form-input {
            padding-left: 2.5rem;
        }

        .btn-auth {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--blue-600), var(--purple-500));
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-auth::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--purple-500), var(--blue-600));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn-auth:hover::before {
            opacity: 1;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }

        .btn-auth:active {
            transform: translateY(0);
        }

        .btn-auth span {
            position: relative;
            z-index: 1;
        }

        .btn-auth.loading span::after {
            content: ' ⟳';
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.83rem;
            color: var(--red-400);
            margin-top: 0.8rem;
            display: none;
        }

        .auth-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.83rem;
            color: var(--green-400);
            margin-top: 0.8rem;
            display: none;
        }

        /* THEME TOGGLE on login page */
        .login-theme-btn {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
        }

        .login-theme-btn:hover {
            transform: scale(1.1) rotate(20deg);
        }

        /* 3D floating cards in background */
        .floating-cards {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .float-card {
            position: absolute;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px);
            animation: floatCard linear infinite;
        }

        @keyframes floatCard {
            0% {
                transform: translateY(110vh) rotateX(20deg) rotateY(15deg);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            95% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-20vh) rotateX(20deg) rotateY(15deg);
                opacity: 0;
            }
        }

        [data-theme="light"] .login-card {
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        [data-theme="light"] .bg-grid {
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <!-- Backgrounds -->
        <div class="bg-canvas"></div>
        <div class="bg-grid"></div>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="particles" id="particles"></div>
        <div class="floating-cards" id="floatingCards"></div>

        <!-- Theme toggle -->
        <button class="login-theme-btn" id="loginThemeBtn" title="Toggle theme">🌙</button>

        <!-- Login Card -->
        <div class="login-wrapper">
            <div class="login-card" id="loginCard">
                <div class="login-card-inner">
                    <div class="login-logo">
                        <span class="login-logo-icon">◈</span>
                        <div class="login-logo-text">DataPath</div>
                        <div class="login-logo-sub">Your Data Analyst Journey</div>
                    </div>

                    <div class="auth-tabs">
                        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
                        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Create
                            Account</button>
                    </div>

                    <!-- LOGIN FORM -->
                    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <div class="input-wrap">
                                <span class="input-icon">✉</span>
                                <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com"
                                    required autocomplete="email" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="input-wrap">
                                <span class="input-icon">🔒</span>
                                <input type="password" class="form-input" id="loginPassword" placeholder="Your password"
                                    required autocomplete="current-password" />
                            </div>
                        </div>
                        <button type="submit" class="btn-auth" id="loginBtn"><span>Sign In →</span></button>
                        <div class="auth-error" id="loginError"></div>
                    </form>

                    <!-- REGISTER FORM -->
                    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <div class="input-wrap">
                                <span class="input-icon">👤</span>
                                <input type="text" class="form-input" id="regUsername" placeholder="Choose a username"
                                    required autocomplete="username" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <div class="input-wrap">
                                <span class="input-icon">✉</span>
                                <input type="email" class="form-input" id="regEmail" placeholder="you@example.com"
                                    required autocomplete="email" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password (min. 6 characters)</label>
                            <div class="input-wrap">
                                <span class="input-icon">🔒</span>
                                <input type="password" class="form-input" id="regPassword"
                                    placeholder="Create a password" required autocomplete="new-password"
                                    minlength="6" />
                            </div>
                        </div>
                        <button type="submit" class="btn-auth" id="registerBtn"><span>Create Account →</span></button>
                        <div class="auth-error" id="registerError"></div>
                        <div class="auth-success" id="registerSuccess"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const API = 'http://localhost:3001/api';

        // Redirect if already logged in
        if (localStorage.getItem('dp_token')) {
            try {
                const payload = JSON.parse(atob(localStorage.getItem('dp_token').split('.')[1]));
                if (payload.exp * 1000 > Date.now()) window.location.href = '/index.html';
            } catch (e) { localStorage.removeItem('dp_token'); }
        }

        // Theme
        const savedTheme = localStorage.getItem('dp_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('loginThemeBtn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

        document.getElementById('loginThemeBtn').addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            document.getElementById('loginThemeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('dp_theme', next);
        });

        // Tabs
        function switchTab(tab) {
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
        }

        // Login
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading'); btn.disabled = true;
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                localStorage.setItem('dp_token', data.token);
                localStorage.setItem('dp_user', JSON.stringify(data.user));
                window.location.href = '/index.html';
            } catch (err) {
                errEl.textContent = err.message; errEl.style.display = 'block';
            } finally { btn.classList.remove('loading'); btn.disabled = false; }
        }

        // Register
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.classList.add('loading'); btn.disabled = true;
            const errEl = document.getElementById('registerError');
            const sucEl = document.getElementById('registerSuccess');
            errEl.style.display = 'none'; sucEl.style.display = 'none';
            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('regUsername').value,
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Registration failed');
                localStorage.setItem('dp_token', data.token);
                localStorage.setItem('dp_user', JSON.stringify(data.user));
                sucEl.textContent = '🎉 Account created! Redirecting…'; sucEl.style.display = 'block';
                setTimeout(() => window.location.href = '/index.html', 1000);
            } catch (err) {
                errEl.textContent = err.message; errEl.style.display = 'block';
            } finally { btn.classList.remove('loading'); btn.disabled = false; }
        }

        // 3D card mouse tracking
        const card = document.getElementById('loginCard');
        document.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = (e.clientX - cx) / window.innerWidth;
            const dy = (e.clientY - cy) / window.innerHeight;
            card.style.transform = `perspective(800px) rotateY(${dx * 10}deg) rotateX(${-dy * 8}deg)`;
        });
        document.addEventListener('mouseleave', () => { card.style.transform = 'perspective(800px) rotateX(0) rotateY(0)'; });

        // Floating particles
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2;
            p.style.cssText = `left:${Math.random() * 100}%;width:${size}px;height:${size}px;animation-duration:${Math.random() * 15 + 10}s;animation-delay:${Math.random() * 15}s`;
            pContainer.appendChild(p);
        }

        // Floating background cards
        const fcContainer = document.getElementById('floatingCards');
        const cardData = ['Python 🐍', 'SQL 🗄', 'Excel 📊', 'Pandas 🐼', 'ML 🤖', 'Stats 📐', 'EDA 🔍', 'Viz 🎨'];
        cardData.forEach((label, i) => {
            const fc = document.createElement('div');
            fc.className = 'float-card';
            const size = Math.random() * 60 + 60;
            fc.style.cssText = `left:${Math.random() * 100}%;width:${size}px;height:${size}px;animation-duration:${Math.random() * 20 + 15}s;animation-delay:${Math.random() * 15}s;font-size:0.65rem;color:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;`;
            fc.textContent = label;
            fcContainer.appendChild(fc);
        });
    </script>
</body>

</html>
